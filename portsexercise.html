<!DOCTYPE html>
<html>
<head>
    <title>Port Exercise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="ports.html" class="back-button">← Back</a>
    
    <div class="exercise-layout">
    
        <div class="robot-panel">
            <h2>Robot</h2>
            <div class="robot-placeholder">
                Robot Image Here
            </div>
        </div>
    
        <div class="devices-panel">
    
            <h2>Devices</h2>
    
            <button id="addDeviceBtn">+ Add Device</button>

            <div id="deviceSelector" class="hidden">
            
                <h3>Select Device</h3>
            
                <button class="device-option">Drivetrain</button>
                <button class="device-option">Motor</button>
                <button class="device-option">Distance Sensor</button>
                <button class="device-option">Optical Sensor</button>
                <button class="device-option">Touch LED</button>
                <button class="device-option">Bumper</button>
            
            </div>

            <div id="portSelector" class="hidden">
            
                <h3>Select Port</h3>
            
                <div class="port-grid">
            
                    <button class="port-btn">1</button>
                    <button class="port-btn">2</button>
                    <button class="port-btn">3</button>
                    <button class="port-btn">4</button>
            
                    <button class="port-btn">5</button>
                    <button class="port-btn">6</button>
                    <button class="port-btn">7</button>
                    <button class="port-btn">8</button>
            
                    <button class="port-btn">9</button>
                    <button class="port-btn">10</button>
                    <button class="port-btn">11</button>
                    <button class="port-btn">12</button>
            
                </div>
            
            </div>
    
            <div id="deviceList"></div>
    
        </div>
    
    </div>
    <script src="script.js"></script>
</body>
</html>
